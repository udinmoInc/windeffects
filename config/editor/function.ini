# WindEffects editor function configuration
# Grid settings are hot-reloaded when this file changes.

[EditorGrid]
# Thickness (px)
EditorGrid.MinorThickness=1.0
EditorGrid.MajorThickness=1.1
EditorGrid.AxisThickness=1.1

# Colors (linear RGBA) — avoid pure white / bloom
EditorGrid.MinorGridColor=0.27,0.27,0.27,0.30
EditorGrid.MajorGridColor=0.37,0.37,0.37,0.45
EditorGrid.AxisXColor=0.57,0.29,0.29,0.55
EditorGrid.AxisZColor=0.29,0.57,0.29,0.55

# Disable any “glow” style controls (kept for config parity)
EditorGrid.AxisBloom=0
EditorGrid.AxisGlow=0.0
EditorGrid.AxisEmissive=0.0

# Keep legacy keys aligned (in case an older build reads them)
EditorGrid.LineThicknessMinor=1.0
EditorGrid.LineThicknessMajor=1.1
EditorGrid.MinorLineColor=0.27,0.27,0.27
EditorGrid.MinorLineOpacity=0.30
EditorGrid.MajorLineColor=0.37,0.37,0.37
EditorGrid.MajorLineOpacity=0.45

# Defaults / misc
EditorGrid.Enabled=1
EditorGrid.EnableAxisLines=1
EditorGrid.AntiAliasingEnabled=1
EditorGrid.AntiAliasScale=1.0
EditorGrid.BaseOpacity=1.0
EditorGrid.SnapOriginToCamera=1
